schema: spec-driven

context: |
  Tech stack: Astro 6 + TailwindCSS v4 (Vite plugin)
  Package manager: pnpm
  Build command: pnpm build
  Dev command: pnpm dev
  Lint command: pnpm lint
  Type check: pnpm typecheck
  Domain: Marketing/dashboard site for LocalCloud — a local-first Google Cloud emulator platform
  Deployment: GitHub Pages via LocalStack-Google/localstack-google.github.io repo
  Docker image: jaysen2apache/localcloud
  No Pro/Community tier badges on services — all services run trial then license-gated
  New services show as "Planned — coming soon"
  Docs use DocsLayout.astro with sidebar defined inline
  Icons are simple SVG Google Cloud-style glyphs at 24x24 in public/icons/
  PostHog analytics configured in BaseLayout.astro
  Site pages: homepage, services overview, individual service pages, docs/*, changelog
  Footer license: Proprietary — free for personal/evaluation use
