<svg width="1200" height="860" viewBox="0 0 1200 860" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="hero-bridge-title hero-bridge-desc">
  <title id="hero-bridge-title">LocalCloud SDK bridge illustration</title>
  <desc id="hero-bridge-desc">A flow diagram showing cloud-oriented SDK usage redirecting through LocalCloud to a local runtime and console.</desc>
  <defs>
    <linearGradient id="hsb-bg" x1="0" y1="0" x2="1200" y2="860" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#FBFDFF"/>
      <stop offset="1" stop-color="#EAF3FF"/>
    </linearGradient>
    <linearGradient id="hsb-arrow" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#2C72F6" stop-opacity="0"/>
      <stop offset="0.45" stop-color="#2C72F6" stop-opacity="1"/>
      <stop offset="1" stop-color="#61D8A0" stop-opacity="1"/>
    </linearGradient>
    <filter id="hsb-shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="24" stdDeviation="24" flood-color="#6A8FCC" flood-opacity="0.18"/>
    </filter>
  </defs>

  <rect width="1200" height="860" rx="34" fill="url(#hsb-bg)"/>
  <circle cx="146" cy="132" r="138" fill="#DBE8FF" fill-opacity="0.42"/>
  <circle cx="1046" cy="708" r="168" fill="#DBE8FF" fill-opacity="0.28"/>

  <g opacity="0.45" stroke="#D2DFF3" stroke-width="1.2">
    <path d="M84 706L310 592L610 668L906 568L1114 640"/>
    <path d="M128 230L352 278L600 210L900 268L1090 214"/>
  </g>

  <g transform="translate(76 104)">
    <circle cx="86" cy="48" r="50" fill="#DCE8FB"/>
    <circle cx="138" cy="42" r="42" fill="#DCE8FB"/>
    <circle cx="176" cy="64" r="34" fill="#DCE8FB"/>
    <rect x="70" y="62" width="144" height="42" rx="21" fill="#DCE8FB"/>
    <image href="../icons/gcs.svg" x="84" y="32" width="28" height="28"/>
    <image href="../icons/pubsub.svg" x="126" y="24" width="28" height="28"/>
    <image href="../icons/spanner.svg" x="166" y="46" width="28" height="28"/>
    <text x="82" y="132" fill="#2C72F6" font-family="IBM Plex Mono, monospace" font-size="13" letter-spacing="1.5">GOOGLE CLOUD SHAPE</text>
  </g>

  <g filter="url(#hsb-shadow)">
    <rect x="92" y="252" width="290" height="246" rx="30" fill="#FFFFFF" stroke="#D4E2F4" stroke-width="2"/>
    <text x="124" y="292" fill="#6B7F9D" font-family="IBM Plex Mono, monospace" font-size="14" letter-spacing="1.5">EXISTING APP CODE</text>
    <text x="124" y="334" fill="#12233D" font-family="IBM Plex Sans, sans-serif" font-size="34" font-weight="600">Use the same SDKs</text>
    <text x="124" y="368" fill="#58708F" font-family="IBM Plex Sans, sans-serif" font-size="19">No branching in your app. No mock-specific client code.</text>
    <rect x="124" y="402" width="206" height="40" rx="20" fill="#F7FAFF" stroke="#D7E5F6" stroke-width="2"/>
    <text x="148" y="426" fill="#2C72F6" font-family="IBM Plex Mono, monospace" font-size="12">storage.Client()</text>
    <rect x="124" y="452" width="206" height="40" rx="20" fill="#F7FAFF" stroke="#D7E5F6" stroke-width="2"/>
    <text x="148" y="476" fill="#2C72F6" font-family="IBM Plex Mono, monospace" font-size="12">google-cloud-pubsub</text>
  </g>

  <path d="M382 372C470 372 520 360 576 330" fill="none" stroke="url(#hsb-arrow)" stroke-width="14" stroke-linecap="round" stroke-dasharray="18 16">
    <animate attributeName="stroke-dashoffset" from="0" to="-68" dur="3.1s" repeatCount="indefinite"/>
  </path>

  <g filter="url(#hsb-shadow)">
    <rect x="504" y="188" width="214" height="118" rx="28" fill="#FFFFFF" stroke="#D4E2F4" stroke-width="2"/>
    <text x="532" y="228" fill="#6B7F9D" font-family="IBM Plex Mono, monospace" font-size="14" letter-spacing="1.4">SDK HANDOFF</text>
    <text x="532" y="268" fill="#12233D" font-family="IBM Plex Sans, sans-serif" font-size="28" font-weight="600">/_localcloud/env</text>
    <text x="532" y="292" fill="#58708F" font-family="IBM Plex Sans, sans-serif" font-size="18">Generate localhost targets automatically</text>
  </g>

  <path d="M610 306V382" stroke="#2C72F6" stroke-width="12" stroke-linecap="round" stroke-dasharray="16 14">
    <animate attributeName="stroke-dashoffset" from="0" to="-58" dur="3.2s" repeatCount="indefinite"/>
  </path>

  <g filter="url(#hsb-shadow)">
    <rect x="430" y="384" width="360" height="252" rx="34" fill="#0F1C30"/>
    <text x="462" y="426" fill="#8CA8D6" font-family="IBM Plex Mono, monospace" font-size="14" letter-spacing="1.5">LOCALCLOUD RUNTIME</text>
    <text x="462" y="472" fill="#F5F9FF" font-family="IBM Plex Sans, sans-serif" font-size="40" font-weight="600">One local container</text>
    <text x="462" y="506" fill="#C4D7F8" font-family="IBM Plex Sans, sans-serif" font-size="20">Gateway, services, health, browse, env export, and console surface.</text>
    <rect x="462" y="544" width="296" height="46" rx="23" fill="#172940"/>
    <text x="486" y="572" fill="#DCEAFF" font-family="IBM Plex Mono, monospace" font-size="13">localhost before shared projects</text>
  </g>

  <path d="M790 490C854 490 900 478 952 426" fill="none" stroke="url(#hsb-arrow)" stroke-width="14" stroke-linecap="round" stroke-dasharray="18 16">
    <animate attributeName="stroke-dashoffset" from="0" to="-68" dur="3.1s" repeatCount="indefinite"/>
  </path>

  <g filter="url(#hsb-shadow)">
    <rect x="880" y="234" width="238" height="236" rx="28" fill="#FFFFFF" stroke="#D4E2F4" stroke-width="2"/>
    <text x="908" y="274" fill="#6B7F9D" font-family="IBM Plex Mono, monospace" font-size="14" letter-spacing="1.5">LOCAL CONSOLE</text>
    <rect x="908" y="300" width="182" height="132" rx="22" fill="#0F1C30"/>
    <circle cx="932" cy="330" r="6" fill="#61D8A0"/>
    <circle cx="932" cy="366" r="6" fill="#61D8A0"/>
    <circle cx="932" cy="402" r="6" fill="#61D8A0"/>
    <text x="950" y="335" fill="#DCEAFF" font-family="IBM Plex Sans, sans-serif" font-size="20">gateway healthy</text>
    <text x="950" y="371" fill="#DCEAFF" font-family="IBM Plex Sans, sans-serif" font-size="20">env handoff ready</text>
    <text x="950" y="407" fill="#DCEAFF" font-family="IBM Plex Sans, sans-serif" font-size="20">services online</text>
  </g>

  <g transform="translate(170 682)">
    <rect width="860" height="92" rx="26" fill="#FFFFFF" stroke="#D4E2F4" stroke-width="2"/>
    <text x="28" y="38" fill="#6B7F9D" font-family="IBM Plex Mono, monospace" font-size="14" letter-spacing="1.5">WHAT RUNS LOCALLY</text>
    <image href="../icons/gcs.svg" x="30" y="48" width="28" height="28"/>
    <image href="../icons/firestore.svg" x="124" y="48" width="28" height="28"/>
    <image href="../icons/bigquery.svg" x="218" y="48" width="28" height="28"/>
    <image href="../icons/pubsub.svg" x="312" y="48" width="28" height="28"/>
    <image href="../icons/secretmanager.svg" x="406" y="48" width="28" height="28"/>
    <image href="../icons/logging.svg" x="500" y="48" width="28" height="28"/>
    <image href="../icons/compute.svg" x="594" y="48" width="28" height="28"/>
    <text x="72" y="67" fill="#12233D" font-family="IBM Plex Sans, sans-serif" font-size="18" font-weight="600">Storage</text>
    <text x="166" y="67" fill="#12233D" font-family="IBM Plex Sans, sans-serif" font-size="18" font-weight="600">Data</text>
    <text x="260" y="67" fill="#12233D" font-family="IBM Plex Sans, sans-serif" font-size="18" font-weight="600">Analytics</text>
    <text x="354" y="67" fill="#12233D" font-family="IBM Plex Sans, sans-serif" font-size="18" font-weight="600">Events</text>
    <text x="448" y="67" fill="#12233D" font-family="IBM Plex Sans, sans-serif" font-size="18" font-weight="600">Secrets</text>
    <text x="542" y="67" fill="#12233D" font-family="IBM Plex Sans, sans-serif" font-size="18" font-weight="600">Ops</text>
    <text x="636" y="67" fill="#12233D" font-family="IBM Plex Sans, sans-serif" font-size="18" font-weight="600">Runtime</text>
  </g>
</svg>
