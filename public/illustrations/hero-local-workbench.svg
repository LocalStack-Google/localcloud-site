<svg width="1200" height="860" viewBox="0 0 1200 860" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="hero-workbench-title hero-workbench-desc">
  <title id="hero-workbench-title">LocalCloud workbench illustration</title>
  <desc id="hero-workbench-desc">A clean developer workbench showing unchanged SDK calls flowing into a LocalCloud runtime block and a local console.</desc>
  <defs>
    <linearGradient id="hlw-bg" x1="0" y1="0" x2="1200" y2="860" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#FCFEFF"/>
      <stop offset="1" stop-color="#EAF3FF"/>
    </linearGradient>
    <linearGradient id="hlw-blue" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#2C72F6"/>
      <stop offset="1" stop-color="#7AA7FF"/>
    </linearGradient>
    <linearGradient id="hlw-green" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#61D8A0"/>
      <stop offset="1" stop-color="#86E6B7"/>
    </linearGradient>
    <filter id="hlw-shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="24" stdDeviation="24" flood-color="#6A8FCC" flood-opacity="0.18"/>
    </filter>
  </defs>

  <rect width="1200" height="860" rx="34" fill="url(#hlw-bg)"/>
  <circle cx="168" cy="132" r="146" fill="#DBE8FF" fill-opacity="0.42"/>
  <circle cx="1030" cy="716" r="170" fill="#DBE8FF" fill-opacity="0.28"/>

  <g opacity="0.42" stroke="#D2DFF3" stroke-width="1.2">
    <path d="M86 694L344 594L626 650L920 574L1118 626"/>
    <path d="M120 236L336 284L614 214L896 272L1086 222"/>
  </g>

  <g filter="url(#hlw-shadow)">
    <rect x="78" y="90" width="1044" height="650" rx="34" fill="#F9FCFF" stroke="#D3E2F5" stroke-width="2"/>
  </g>

  <rect x="112" y="124" width="266" height="218" rx="28" fill="#FFFFFF" stroke="#D4E2F4" stroke-width="2"/>
  <text x="142" y="166" fill="#6B7F9D" font-family="IBM Plex Mono, monospace" font-size="15" letter-spacing="1.6">UNCHANGED SDKS</text>
  <rect x="142" y="192" width="184" height="40" rx="20" fill="#F7FAFF" stroke="#D7E5F6" stroke-width="2"/>
  <text x="164" y="216" fill="#2C72F6" font-family="IBM Plex Mono, monospace" font-size="12">storage.Client()</text>
  <rect x="142" y="244" width="184" height="40" rx="20" fill="#F7FAFF" stroke="#D7E5F6" stroke-width="2"/>
  <text x="164" y="268" fill="#2C72F6" font-family="IBM Plex Mono, monospace" font-size="12">pubsub.NewClient()</text>
  <rect x="142" y="296" width="184" height="40" rx="20" fill="#F7FAFF" stroke="#D7E5F6" stroke-width="2"/>
  <text x="164" y="320" fill="#2C72F6" font-family="IBM Plex Mono, monospace" font-size="12">spanner.NewClient()</text>

  <path d="M378 234C472 234 520 248 586 304" fill="none" stroke="#7AA7FF" stroke-width="12" stroke-linecap="round" stroke-dasharray="16 16">
    <animate attributeName="stroke-dashoffset" from="0" to="-64" dur="3.4s" repeatCount="indefinite"/>
  </path>

  <g transform="translate(448 196)" filter="url(#hlw-shadow)">
    <rect width="322" height="318" rx="36" fill="url(#hlw-blue)"/>
    <rect x="18" y="18" width="286" height="282" rx="28" fill="#F6FAFF" fill-opacity="0.12" stroke="#BFD7FF" stroke-width="2"/>
    <text x="34" y="52" fill="#DCEAFF" font-family="IBM Plex Mono, monospace" font-size="14" letter-spacing="1.6">LOCALCLOUD</text>
    <text x="34" y="96" fill="#F7FBFF" font-family="IBM Plex Sans, sans-serif" font-size="42" font-weight="600">One container</text>
    <text x="34" y="130" fill="#DDEBFF" font-family="IBM Plex Sans, sans-serif" font-size="20">Gateway, services, data, and console surface</text>

    <rect x="34" y="166" width="254" height="54" rx="18" fill="#FFFFFF" fill-opacity="0.12" stroke="#CDE1FF" stroke-width="2"/>
    <text x="56" y="198" fill="#F7FBFF" font-family="IBM Plex Sans, sans-serif" font-size="22" font-weight="600">/_localcloud/env?format=shell</text>

    <rect x="34" y="238" width="118" height="36" rx="18" fill="#FFFFFF" fill-opacity="0.14" stroke="#CDE1FF" stroke-width="2"/>
    <text x="52" y="261" fill="#F7FBFF" font-family="IBM Plex Mono, monospace" font-size="12">localhost handoff</text>
    <rect x="166" y="238" width="122" height="36" rx="18" fill="#FFFFFF" fill-opacity="0.14" stroke="#CDE1FF" stroke-width="2"/>
    <text x="188" y="261" fill="#F7FBFF" font-family="IBM Plex Mono, monospace" font-size="12">seed data ready</text>
  </g>

  <path d="M770 352C836 352 876 344 926 314" fill="none" stroke="url(#hlw-green)" stroke-width="12" stroke-linecap="round" stroke-dasharray="18 16">
    <animate attributeName="stroke-dashoffset" from="0" to="-68" dur="3.2s" repeatCount="indefinite"/>
  </path>

  <g filter="url(#hlw-shadow)">
    <rect x="878" y="150" width="250" height="224" rx="28" fill="#0F1C30"/>
    <text x="906" y="188" fill="#8CA8D6" font-family="IBM Plex Mono, monospace" font-size="14" letter-spacing="1.5">LOCAL CONSOLE</text>
    <circle cx="914" cy="224" r="7" fill="#61D8A0"/>
    <text x="936" y="229" fill="#DCEAFF" font-family="IBM Plex Sans, sans-serif" font-size="22">gateway healthy</text>
    <circle cx="914" cy="268" r="7" fill="#61D8A0"/>
    <text x="936" y="273" fill="#DCEAFF" font-family="IBM Plex Sans, sans-serif" font-size="22">env handoff ready</text>
    <circle cx="914" cy="312" r="7" fill="#61D8A0"/>
    <text x="936" y="317" fill="#DCEAFF" font-family="IBM Plex Sans, sans-serif" font-size="22">services online</text>
  </g>

  <g transform="translate(132 430)">
    <rect width="944" height="246" rx="30" fill="#FFFFFF" stroke="#D4E2F4" stroke-width="2"/>
    <text x="28" y="42" fill="#6B7F9D" font-family="IBM Plex Mono, monospace" font-size="14" letter-spacing="1.6">SERVICE COVERAGE</text>
    <text x="28" y="82" fill="#12233D" font-family="IBM Plex Sans, sans-serif" font-size="34" font-weight="600">Major Google Cloud services, grouped for local development</text>

    <g transform="translate(28 118)">
      <rect width="126" height="94" rx="22" fill="#F6FAFF" stroke="#D8E5F6" stroke-width="2"/>
      <image href="../icons/gcs.svg" x="44" y="20" width="38" height="38"/>
      <text x="63" y="76" fill="#12233D" font-family="IBM Plex Sans, sans-serif" font-size="18" font-weight="600" text-anchor="middle">Storage</text>
    </g>
    <g transform="translate(174 118)">
      <rect width="126" height="94" rx="22" fill="#F6FAFF" stroke="#D8E5F6" stroke-width="2"/>
      <image href="../icons/firestore.svg" x="44" y="20" width="38" height="38"/>
      <text x="63" y="76" fill="#12233D" font-family="IBM Plex Sans, sans-serif" font-size="18" font-weight="600" text-anchor="middle">Data</text>
    </g>
    <g transform="translate(320 118)">
      <rect width="126" height="94" rx="22" fill="#F6FAFF" stroke="#D8E5F6" stroke-width="2"/>
      <image href="../icons/bigquery.svg" x="44" y="20" width="38" height="38"/>
      <text x="63" y="76" fill="#12233D" font-family="IBM Plex Sans, sans-serif" font-size="18" font-weight="600" text-anchor="middle">Analytics</text>
    </g>
    <g transform="translate(466 118)">
      <rect width="126" height="94" rx="22" fill="#F6FAFF" stroke="#D8E5F6" stroke-width="2"/>
      <image href="../icons/pubsub.svg" x="44" y="20" width="38" height="38"/>
      <text x="63" y="76" fill="#12233D" font-family="IBM Plex Sans, sans-serif" font-size="18" font-weight="600" text-anchor="middle">Messaging</text>
    </g>
    <g transform="translate(612 118)">
      <rect width="126" height="94" rx="22" fill="#F6FAFF" stroke="#D8E5F6" stroke-width="2"/>
      <image href="../icons/secretmanager.svg" x="44" y="20" width="38" height="38"/>
      <text x="63" y="76" fill="#12233D" font-family="IBM Plex Sans, sans-serif" font-size="18" font-weight="600" text-anchor="middle">Security</text>
    </g>
    <g transform="translate(758 118)">
      <rect width="126" height="94" rx="22" fill="#F6FAFF" stroke="#D8E5F6" stroke-width="2"/>
      <image href="../icons/logging.svg" x="44" y="20" width="38" height="38"/>
      <text x="63" y="76" fill="#12233D" font-family="IBM Plex Sans, sans-serif" font-size="18" font-weight="600" text-anchor="middle">Ops</text>
    </g>
  </g>
</svg>
