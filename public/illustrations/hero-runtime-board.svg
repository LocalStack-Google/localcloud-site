<svg width="1200" height="860" viewBox="0 0 1200 860" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="hero-board-title hero-board-desc">
  <title id="hero-board-title">LocalCloud runtime board illustration</title>
  <desc id="hero-board-desc">A structured board showing LocalCloud as one container with gateway, service groups, and a local console panel.</desc>
  <defs>
    <linearGradient id="hrb-bg" x1="0" y1="0" x2="1200" y2="860" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#FCFEFF"/>
      <stop offset="1" stop-color="#EAF3FF"/>
    </linearGradient>
    <linearGradient id="hrb-panel" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#18263B"/>
      <stop offset="1" stop-color="#0F1C30"/>
    </linearGradient>
    <filter id="hrb-shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="24" stdDeviation="24" flood-color="#6A8FCC" flood-opacity="0.18"/>
    </filter>
  </defs>

  <rect width="1200" height="860" rx="34" fill="url(#hrb-bg)"/>
  <circle cx="150" cy="118" r="140" fill="#DBE8FF" fill-opacity="0.42"/>
  <circle cx="1042" cy="710" r="168" fill="#DBE8FF" fill-opacity="0.28"/>

  <g opacity="0.42" stroke="#D2DFF3" stroke-width="1.2">
    <path d="M86 704L330 600L620 664L910 572L1116 636"/>
    <path d="M122 220L356 270L616 204L898 262L1088 212"/>
  </g>

  <g filter="url(#hrb-shadow)">
    <rect x="94" y="94" width="1012" height="656" rx="34" fill="#F9FCFF" stroke="#D3E2F5" stroke-width="2"/>
  </g>

  <rect x="128" y="126" width="944" height="72" rx="24" fill="#FFFFFF" stroke="#D4E2F4" stroke-width="2"/>
  <text x="160" y="156" fill="#6B7F9D" font-family="IBM Plex Mono, monospace" font-size="14" letter-spacing="1.6">LOCALCLOUD</text>
  <text x="160" y="182" fill="#12233D" font-family="IBM Plex Sans, sans-serif" font-size="32" font-weight="600">One container that makes local Google Cloud workflows visible</text>

  <g filter="url(#hrb-shadow)">
    <rect x="128" y="236" width="598" height="416" rx="30" fill="url(#hrb-panel)"/>
    <text x="160" y="278" fill="#8CA8D6" font-family="IBM Plex Mono, monospace" font-size="14" letter-spacing="1.5">RUNTIME BOARD</text>
    <rect x="160" y="308" width="534" height="94" rx="22" fill="#13233B" stroke="#284263" stroke-width="2"/>
    <text x="188" y="344" fill="#DCEAFF" font-family="IBM Plex Sans, sans-serif" font-size="28" font-weight="600">Gateway :8080</text>
    <text x="188" y="376" fill="#BBD0F1" font-family="IBM Plex Sans, sans-serif" font-size="19">Admin API, env export, health, browse, and console</text>

    <rect x="160" y="426" width="162" height="164" rx="22" fill="#13233B" stroke="#284263" stroke-width="2"/>
    <text x="184" y="460" fill="#8CA8D6" font-family="IBM Plex Mono, monospace" font-size="13" letter-spacing="1.4">STORAGE + DATA</text>
    <image href="../icons/gcs.svg" x="188" y="484" width="34" height="34"/>
    <image href="../icons/firestore.svg" x="234" y="484" width="34" height="34"/>
    <image href="../icons/spanner.svg" x="188" y="530" width="34" height="34"/>
    <image href="../icons/bigtable.svg" x="234" y="530" width="34" height="34"/>
    <text x="184" y="580" fill="#DCEAFF" font-family="IBM Plex Sans, sans-serif" font-size="18">Buckets, documents, SQL, wide-column, cache</text>

    <rect x="346" y="426" width="162" height="164" rx="22" fill="#13233B" stroke="#284263" stroke-width="2"/>
    <text x="370" y="460" fill="#8CA8D6" font-family="IBM Plex Mono, monospace" font-size="13" letter-spacing="1.4">ANALYTICS + EVENTS</text>
    <image href="../icons/bigquery.svg" x="398" y="484" width="34" height="34"/>
    <image href="../icons/pubsub.svg" x="444" y="484" width="34" height="34"/>
    <image href="../icons/cloudtasks.svg" x="398" y="530" width="34" height="34"/>
    <image href="../icons/workflows.svg" x="444" y="530" width="34" height="34"/>
    <text x="370" y="580" fill="#DCEAFF" font-family="IBM Plex Sans, sans-serif" font-size="18">Queries, topics, jobs, and orchestration</text>

    <rect x="532" y="426" width="162" height="164" rx="22" fill="#13233B" stroke="#284263" stroke-width="2"/>
    <text x="556" y="460" fill="#8CA8D6" font-family="IBM Plex Mono, monospace" font-size="13" letter-spacing="1.4">OPS + RUNTIME</text>
    <image href="../icons/logging.svg" x="584" y="484" width="34" height="34"/>
    <image href="../icons/monitoring.svg" x="630" y="484" width="34" height="34"/>
    <image href="../icons/compute.svg" x="584" y="530" width="34" height="34"/>
    <image href="../icons/cloudrun.svg" x="630" y="530" width="34" height="34"/>
    <text x="556" y="580" fill="#DCEAFF" font-family="IBM Plex Sans, sans-serif" font-size="18">Health, logs, metrics, and opt-in runtime</text>
  </g>

  <g filter="url(#hrb-shadow)">
    <rect x="770" y="236" width="302" height="190" rx="28" fill="#FFFFFF" stroke="#D4E2F4" stroke-width="2"/>
    <text x="800" y="276" fill="#6B7F9D" font-family="IBM Plex Mono, monospace" font-size="14" letter-spacing="1.5">LOCALHOST HANDOFF</text>
    <text x="800" y="318" fill="#12233D" font-family="IBM Plex Sans, sans-serif" font-size="30" font-weight="600">No code changes</text>
    <text x="800" y="350" fill="#58708F" font-family="IBM Plex Sans, sans-serif" font-size="19">Generate the env vars once and keep the same Google Cloud SDK shape your app already uses.</text>
  </g>

  <g filter="url(#hrb-shadow)">
    <rect x="770" y="454" width="302" height="198" rx="28" fill="#0F1C30"/>
    <text x="800" y="494" fill="#8CA8D6" font-family="IBM Plex Mono, monospace" font-size="14" letter-spacing="1.5">LOCAL CONSOLE</text>
    <circle cx="808" cy="532" r="7" fill="#61D8A0"/>
    <text x="830" y="537" fill="#DCEAFF" font-family="IBM Plex Sans, sans-serif" font-size="22">gateway healthy</text>
    <circle cx="808" cy="576" r="7" fill="#61D8A0"/>
    <text x="830" y="581" fill="#DCEAFF" font-family="IBM Plex Sans, sans-serif" font-size="22">env handoff ready</text>
    <circle cx="808" cy="620" r="7" fill="#61D8A0"/>
    <text x="830" y="625" fill="#DCEAFF" font-family="IBM Plex Sans, sans-serif" font-size="22">services online</text>
  </g>

  <path d="M726 334H770" stroke="#7AA7FF" stroke-width="6" stroke-linecap="round"/>
  <path d="M726 544H770" stroke="#61D8A0" stroke-width="6" stroke-linecap="round"/>
</svg>
